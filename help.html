<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONDA Replay — Help</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F0F0;
      color: #333333;
      min-height: 100vh;
    }

    header {
      background: #009688;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    header p {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    #search-bar {
      padding: 12px 24px;
      background: #E7E7E7;
      border-bottom: 1px solid #D0D0D0;
    }
    #search-bar input {
      width: 100%;
      max-width: 500px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #C0C0C0;
      background: #FFFFFF;
      color: #333333;
      font-size: 14px;
      outline: none;
    }
    #search-bar input:focus { border-color: #009688; }

    #layout {
      display: flex;
      min-height: calc(100vh - 110px);
    }

    /* ── Tag sidebar ── */
    #tag-panel {
      width: 180px;
      min-width: 180px;
      background: #FFFFFF;
      border-right: 1px solid #E0E0E0;
      padding: 16px 12px;
      overflow-y: auto;
    }
    #tag-panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999999;
      margin-bottom: 10px;
    }
    .tag-btn {
      display: inline-block;
      width: 100%;
      text-align: left;
      padding: 5px 12px;
      margin-bottom: 5px;
      border-radius: 20px;
      border: none;
      background: #7EA59C;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tag-btn:hover { background: #6a9189; }
    .tag-btn.active { background: #009688; color: #fff; }
    .tag-btn .count {
      float: right;
      font-size: 11px;
      color: rgba(255,255,255,0.65);
    }
    .tag-btn.active .count { color: rgba(255,255,255,0.75); }
    .sidebar-section {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #AAAAAA;
      margin: 14px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #E8E8E8;
    }
    .sidebar-section:first-child { margin-top: 0; }

    /* ── Cards (collapsed tiles only) ── */
    #card-panel {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
    }

    .help-card {
      background: #FFFFFF;
      border: 1px solid #DCDCDC;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
    }
    .help-card:hover { border-color: #009688; box-shadow: 0 1px 4px rgba(0,150,136,0.12); }

    .card-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 10px;
    }
    .card-header-text { flex: 1; }
    .card-chevron { font-size: 12px; color: #AAAAAA; flex-shrink: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #222222;
      margin-bottom: 2px;
    }
    .card-screen {
      font-size: 10px;
      color: #009688;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #no-results {
      text-align: center;
      color: #888888;
      padding: 60px 20px;
      font-size: 15px;
      display: none;
    }

    /* ── Bottom sheet ── */
    #sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
    }
    #sheet-overlay.open { display: block; }

    #bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 75vh;
      background: #FFFFFF;
      border-radius: 16px 16px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    }
    #bottom-sheet.open { transform: translateY(0); }

    #sheet-handle-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0 6px;
      cursor: pointer;
    }
    #sheet-handle-bar div {
      width: 36px;
      height: 4px;
      background: #CCCCCC;
      border-radius: 2px;
    }

    #sheet-header {
      flex-shrink: 0;
      padding: 0 16px 10px;
      border-bottom: 1px solid #E8E8E8;
    }
    #sheet-screen {
      font-size: 10px;
      color: #009688;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    #sheet-title {
      font-size: 16px;
      font-weight: 700;
      color: #222222;
    }

    #sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }

    #sheet-thumb-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: flex-start;
    }
    #sheet-thumb {
      width: 90px;
      flex-shrink: 0;
      border-radius: 8px;
      border: 1px solid #DCDCDC;
      cursor: zoom-in;
    }
    #sheet-thumb:hover { opacity: 0.85; }
    #sheet-thumb-hint {
      font-size: 10px;
      color: #888888;
      text-align: center;
      margin-top: 4px;
    }
    #sheet-summary {
      flex: 1;
      font-size: 13px;
      color: #555555;
      line-height: 1.6;
    }

    .callout-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .callout-table th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888888;
      padding: 4px 8px 8px 0;
      border-bottom: 1px solid #E0E0E0;
    }
    .callout-table td {
      padding: 7px 8px 7px 0;
      border-bottom: 1px solid #F0F0F0;
      vertical-align: top;
      color: #444444;
    }
    .callout-table tr:last-child td { border-bottom: none; }
    .callout-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #009688;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .callout-label { font-weight: 600; color: #222222; }

    #sheet-tags {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px 16px;
      border-top: 1px solid #F0F0F0;
    }
    .card-tag {
      padding: 3px 10px;
      border-radius: 12px;
      background: #FFD862;
      color: #555555;
      font-size: 11px;
      cursor: pointer;
    }
    .card-tag:hover { background: #009688; color: #fff; }

    /* ── Lightbox (above sheet) ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 500;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 94vw;
      max-height: 94vh;
      border-radius: 8px;
      object-fit: contain;
      touch-action: pinch-zoom;
    }
    #lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
    }

    /* ── Context banner (when ctx= param is active) ── */
    #ctx-banner {
      display: none;
      background: #008B82;
      color: #fff;
      padding: 8px 24px;
      font-size: 13px;
    }
    #ctx-banner a {
      color: rgba(255,255,255,0.8);
      text-decoration: underline;
      cursor: pointer;
      margin-left: 12px;
    }

    @media (max-width: 640px) {
      #tag-panel { width: 120px; min-width: 120px; padding: 10px 8px; }
      .tag-btn { font-size: 11px; padding: 5px 8px; }
      .tag-btn .count { font-size: 10px; }
      #card-panel { padding: 10px 8px; }
      .card-header { padding: 10px 10px; }
      .card-title { font-size: 13px; }
      .card-body { flex-direction: column; }
      .card-screenshot { width: 100%; min-width: unset; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>ONDA Replay — Help</h1>
    <p>Tap a topic on the left or search above</p>
  </div>
</header>

<div id="ctx-banner">
  Showing help for: <strong id="ctx-label"></strong>
  <a onclick="clearCtx()">Show all</a>
</div>

<div id="search-bar">
  <input type="text" id="search" placeholder="Search help articles…" oninput="render()">
</div>

<div id="layout">
  <div id="tag-panel">
    <div id="sidebar"></div>
  </div>
  <div id="card-panel">
    <div id="cards"></div>
    <div id="no-results">No articles found for that search.</div>
  </div>
</div>

<div id="sheet-overlay" onclick="closeSheet()"></div>

<div id="bottom-sheet">
  <div id="sheet-handle-bar" onclick="closeSheet()"><div></div></div>
  <div id="sheet-header">
    <div id="sheet-screen"></div>
    <div id="sheet-title"></div>
  </div>
  <div id="sheet-body">
    <div id="sheet-thumb-row">
      <div>
        <img id="sheet-thumb" src="" alt="" onclick="openLightbox(event, '')">
        <div id="sheet-thumb-hint">Tap to expand</div>
      </div>
      <div id="sheet-summary"></div>
    </div>
    <table class="callout-table" id="sheet-callouts">
      <tr><th>#</th><th>Control</th><th>Description</th></tr>
    </table>
  </div>
  <div id="sheet-tags"></div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── Help article data ──────────────────────────────────────────────────────

  {

  {

// ── State ──────────────────────────────────────────────────────────────────
let activeTag = null;
let activeScreen = null;

// ── Boot ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const ctx = params.get('ctx');
  if (ctx) {
    activeScreen = ctx;
    document.getElementById('ctx-banner').style.display = 'block';
    document.getElementById('ctx-label').textContent = ctx;
  }
  buildSidebar();
  render();
});

function buildSidebar() {
  const screens = [...new Set(ARTICLES.map(a => a.screen))];
  const screenBase = activeScreen ? ARTICLES.filter(a => a.screen === activeScreen) : ARTICLES;

  const tagCounts = {};
  screenBase.forEach(a => a.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
  const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);

  let html = `<div class="sidebar-section">Screens</div>`;
  html += `<button class="tag-btn ${!activeScreen ? 'active' : ''}" onclick="setScreen(null)">All <span class="count">${ARTICLES.length}</span></button>`;
  screens.forEach(s => {
    const cnt = ARTICLES.filter(a => a.screen === s).length;
    html += `<button class="tag-btn ${activeScreen === s ? 'active' : ''}" onclick="setScreen('${s}')">${s} <span class="count">${cnt}</span></button>`;
  });

  html += `<div class="sidebar-section">Topics</div>`;
  sortedTags.forEach(([tag, count]) => {
    html += `<button class="tag-btn ${activeTag === tag ? 'active' : ''}" onclick="setTag('${tag}')">${tag} <span class="count">${count}</span></button>`;
  });

  document.getElementById('sidebar').innerHTML = html;
}

function setScreen(screen) {
  activeScreen = screen;
  activeTag = null;
  if (!screen) clearCtx();
  buildSidebar();
  render();
}

function setTag(tag) {
  activeTag = tag;
  buildSidebar();
  render();
}

function clearCtx() {
  activeScreen = null;
  activeTag = null;
  document.getElementById('ctx-banner').style.display = 'none';
  window.history.replaceState({}, '', window.location.pathname);
  buildSidebar();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = ARTICLES;
  if (activeScreen) filtered = filtered.filter(a => a.screen === activeScreen);
  if (activeTag) filtered = filtered.filter(a => a.tags.includes(activeTag));
  if (q) filtered = filtered.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.summary.toLowerCase().includes(q) ||
    a.callouts.some(c => c.label.toLowerCase().includes(q) || c.text.toLowerCase().includes(q))
  );

  const el = document.getElementById('cards');
  const none = document.getElementById('no-results');
  if (!filtered.length) { el.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';

  el.innerHTML = filtered.map(a => `
    <div class="help-card" id="article-${a.id}" onclick="openSheet(${a.id})">
      <div class="card-header">
        <div class="card-header-text">
          <div class="card-screen">${a.screen}</div>
          <div class="card-title">${a.title}</div>
        </div>
        <span class="card-chevron">▶</span>
      </div>
    </div>
  `).join('');
}

function openSheet(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;

  document.getElementById('sheet-screen').textContent = a.screen;
  document.getElementById('sheet-title').textContent = a.title;
  document.getElementById('sheet-summary').textContent = a.summary;

  const thumb = document.getElementById('sheet-thumb');
  if (a.image) {
    thumb.src = a.image;
    thumb.style.display = 'block';
    thumb.onclick = (e) => openLightbox(e, a.image);
  } else {
    thumb.style.display = 'none';
  }

  const tbody = document.getElementById('sheet-callouts');
  tbody.innerHTML = '<tr><th>#</th><th>Control</th><th>Description</th></tr>' +
    a.callouts.map(c => `
      <tr>
        <td><span class="callout-num">${c.n}</span></td>
        <td class="callout-label">${c.label}</td>
        <td>${c.text}</td>
      </tr>
    `).join('');

  document.getElementById('sheet-tags').innerHTML =
    a.tags.map(t => `<span class="card-tag" onclick="setTag('${t}');closeSheet();">${t}</span>`).join('');

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('sheet-body').scrollTop = 0;
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

function openLightbox(e, src) {
  e.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
</script>
