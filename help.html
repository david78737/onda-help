<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONDA Replay — Help</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F0F0F0;
      color: #333333;
      min-height: 100vh;
    }

    header {
      background: #009688;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    header p {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    #search-bar {
      padding: 12px 24px;
      background: #E7E7E7;
      border-bottom: 1px solid #D0D0D0;
    }
    #search-bar input {
      width: 100%;
      max-width: 500px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid #C0C0C0;
      background: #FFFFFF;
      color: #333333;
      font-size: 14px;
      outline: none;
    }
    #search-bar input:focus { border-color: #009688; }

    #layout {
      display: flex;
      min-height: calc(100vh - 110px);
    }

    /* ── Tag sidebar ── */
    #tag-panel {
      width: 180px;
      min-width: 180px;
      background: #FFFFFF;
      border-right: 1px solid #E0E0E0;
      padding: 16px 12px;
      overflow-y: auto;
    }
    #tag-panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999999;
      margin-bottom: 10px;
    }
    .tag-btn {
      display: inline-block;
      width: 100%;
      text-align: left;
      padding: 5px 12px;
      margin-bottom: 5px;
      border-radius: 20px;
      border: none;
      background: #7EA59C;
      color: #ffffff;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tag-btn:hover { background: #6a9189; }
    .tag-btn.active { background: #009688; color: #fff; }
    .tag-btn .count {
      float: right;
      font-size: 11px;
      color: rgba(255,255,255,0.65);
    }
    .tag-btn.active .count { color: rgba(255,255,255,0.75); }
    .sidebar-section {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #AAAAAA;
      margin: 14px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #E8E8E8;
    }
    .sidebar-section:first-child { margin-top: 0; }

    /* ── Cards (collapsed tiles only) ── */
    #card-panel {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
    }

    .help-card {
      background: #FFFFFF;
      border: 1px solid #DCDCDC;
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
    }
    .help-card:hover { border-color: #009688; box-shadow: 0 1px 4px rgba(0,150,136,0.12); }

    .card-header {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      gap: 10px;
    }
    .card-header-text { flex: 1; }
    .card-chevron { font-size: 12px; color: #AAAAAA; flex-shrink: 0; }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: #222222;
      margin-bottom: 2px;
    }
    .card-screen {
      font-size: 10px;
      color: #009688;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #no-results {
      text-align: center;
      color: #888888;
      padding: 60px 20px;
      font-size: 15px;
      display: none;
    }

    /* ── Bottom sheet ── */
    #sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
    }
    #sheet-overlay.open { display: block; }

    #bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 75vh;
      background: #FFFFFF;
      border-radius: 16px 16px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.28s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    }
    #bottom-sheet.open { transform: translateY(0); }

    #sheet-handle-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px 0 6px;
      cursor: pointer;
    }
    #sheet-handle-bar div {
      width: 36px;
      height: 4px;
      background: #CCCCCC;
      border-radius: 2px;
    }

    #sheet-header {
      flex-shrink: 0;
      padding: 0 16px 10px;
      border-bottom: 1px solid #E8E8E8;
    }
    #sheet-screen {
      font-size: 10px;
      color: #009688;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    #sheet-title {
      font-size: 16px;
      font-weight: 700;
      color: #222222;
    }

    #sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }

    #sheet-thumb-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: flex-start;
    }
    #sheet-thumb {
      width: 90px;
      flex-shrink: 0;
      border-radius: 8px;
      border: 1px solid #DCDCDC;
      cursor: zoom-in;
    }
    #sheet-thumb:hover { opacity: 0.85; }
    #sheet-thumb-hint {
      font-size: 10px;
      color: #888888;
      text-align: center;
      margin-top: 4px;
    }
    #sheet-summary {
      flex: 1;
      font-size: 13px;
      color: #555555;
      line-height: 1.6;
    }

    .callout-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .callout-table th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888888;
      padding: 4px 8px 8px 0;
      border-bottom: 1px solid #E0E0E0;
    }
    .callout-table td {
      padding: 7px 8px 7px 0;
      border-bottom: 1px solid #F0F0F0;
      vertical-align: top;
      color: #444444;
    }
    .callout-table tr:last-child td { border-bottom: none; }
    .callout-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #009688;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .callout-label { font-weight: 600; color: #222222; }

    #sheet-tags {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 16px 16px;
      border-top: 1px solid #F0F0F0;
    }
    .card-tag {
      padding: 3px 10px;
      border-radius: 12px;
      background: #FFD862;
      color: #555555;
      font-size: 11px;
      cursor: pointer;
    }
    .card-tag:hover { background: #009688; color: #fff; }

    /* ── Lightbox (above sheet) ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 500;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 94vw;
      max-height: 94vh;
      border-radius: 8px;
      object-fit: contain;
      touch-action: pinch-zoom;
    }
    #lightbox-close {
      position: absolute;
      top: 16px;
      right: 20px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
    }

    /* ── Context banner (when ctx= param is active) ── */
    #ctx-banner {
      display: none;
      background: #008B82;
      color: #fff;
      padding: 8px 24px;
      font-size: 13px;
    }
    #ctx-banner a {
      color: rgba(255,255,255,0.8);
      text-decoration: underline;
      cursor: pointer;
      margin-left: 12px;
    }

    @media (max-width: 640px) {
      #tag-panel { width: 120px; min-width: 120px; padding: 10px 8px; }
      .tag-btn { font-size: 11px; padding: 5px 8px; }
      .tag-btn .count { font-size: 10px; }
      #card-panel { padding: 10px 8px; }
      .card-header { padding: 10px 10px; }
      .card-title { font-size: 13px; }
      .card-body { flex-direction: column; }
      .card-screenshot { width: 100%; min-width: unset; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>ONDA Replay — Help</h1>
    <p>Tap a topic on the left or search above</p>
  </div>
</header>

<div id="ctx-banner">
  Showing help for: <strong id="ctx-label"></strong>
  <a onclick="clearCtx()">Show all</a>
</div>

<div id="search-bar">
  <input type="text" id="search" placeholder="Search help articles…" oninput="render()">
</div>

<div id="layout">
  <div id="tag-panel">
    <div id="sidebar"></div>
  </div>
  <div id="card-panel">
    <div id="cards"></div>
    <div id="no-results">No articles found for that search.</div>
  </div>
</div>

<div id="sheet-overlay" onclick="closeSheet()"></div>

<div id="bottom-sheet">
  <div id="sheet-handle-bar" onclick="closeSheet()"><div></div></div>
  <div id="sheet-header">
    <div id="sheet-screen"></div>
    <div id="sheet-title"></div>
  </div>
  <div id="sheet-body">
    <div id="sheet-thumb-row">
      <div>
        <img id="sheet-thumb" src="" alt="" onclick="openLightbox(event, '')">
        <div id="sheet-thumb-hint">Tap to expand</div>
      </div>
      <div id="sheet-summary"></div>
    </div>
    <table class="callout-table" id="sheet-callouts">
      <tr><th>#</th><th>Control</th><th>Description</th></tr>
    </table>
  </div>
  <div id="sheet-tags"></div>
</div>

<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── Help article data ──────────────────────────────────────────────────────
const ARTICLES = [
  {
    id: 1,
    screen: "Recording Studio",
    title: "Recording Studio — Overview",
    tags: ["recording", "studio", "timer", "teleprompter", "pause", "stop"],
    image: "help-images/record-screen-active.png",
    callouts: [
      { n: 1, label: "Back arrow",   text: "Exit Recording Studio and return to your catalog" },
      { n: 2, label: "Help",         text: "Tips, help, and links to the full guide at ondareplay.com" },
      { n: 3, label: "Record",       text: "Tap to begin — audio captures immediately" },
      { n: 4, label: "Pause",        text: "Freeze the recording; tap Record again to resume" },
      { n: 5, label: "Stop",         text: "End the recording and move to naming your session" },

      { n: 7, label: "Canvas",       text: "Your teleprompter text appears here; blank until you load a script" },
    ],
    summary: "The Recording Studio is where you create a new session from scratch. Pausing, stopping, setting a timer — is available the moment recording begins."
  },

      { n: 1, label: "Mark this moment", text: "Drop a marker at this point in the audio — creates a named entry in your session index" },

    ],
    summary: "Markers are forward-thinking. Tap Mark this moment while something important is being said — before you know the full shape of the session. Each marker becomes a navigable entry in the transcript index later, letting you jump directly to that point in the audio."

    id: 3,

  },
  {
    id: 4,

    callouts: [
      { n: 1, label: "Saved as",  text: "The auto-generated name — day, date, and time of the recording" },
      { n: 2, label: "Date tile", text: "Color is unique to the day of the week" },
      { n: 3, label: "Confirm",   text: "Accept the default name and save to your catalog" },
      { n: 4, label: "Customize", text: "Add a title, notes, or tags before saving" },
      { n: 5, label: "Discard",   text: "Delete this recording permanently" },

    summary: "Every recording gets a name automatically — you never lose a session because you forgot to title it. Confirm to save instantly, or Customize to add context before it lands in your catalog."
  },
  {
    id: 5,
    screen: "Catalog",
    title: "Catalog — Overview",
    tags: ["catalog", "cover", "session", "tiles"],
    image: "help-images/catalog-screen.png",
    callouts: [
      { n: 1, label: "ⓘ button",         text: "Opens the Information panel — version, Privacy Policy, and Help & Guide" },
      { n: 2, label: "Photo cover card",  text: "When a cover image exists, it replaces the date tile — tap to view full screen" },
    ],
    summary: "The Catalog is your home screen — every recording you've made or imported appears here as a tile. Color tiles show the day and time recorded. Photo tiles show a cover image you've assigned. Tap any tile to open it."
  },
  {
    id: 6,
    screen: "Sleeve Editor",
    title: "Sleeve Editor — Cover and label",
    tags: ["sleeve", "cover", "label", "notes", "save", "share"],
    image: "help-images/sleeve-editor-1.png",
    callouts: [
      { n: 1, label: "Save",      text: "Confirms label, notes, cover image, and tags — saves to catalog" },
      { n: 2, label: "Take / Pick", text: "Take a new cover photo or choose one from your library" },
      { n: 3, label: "Label",     text: "Short name for this recording — auto-filled with day and time, fully editable" },
      { n: 4, label: "Notes",     text: "Your own description in plain language — used for search and tag generation" },
      { n: 5, label: "Edit (Tags)", text: "Open the tag editor to add or manage tags manually" },
    ],
    summary: "Every recording gets a name and a cover automatically. This screen is your chance to add context — a label, a description, a photo — before it lands in your catalog. The words you type in Notes become your tags."
  },
  {
    id: 7,
    screen: "Sleeve Editor",
    title: "Sleeve Editor — Tags",
    tags: ["sleeve", "tags", "merge", "notes", "vocabulary"],
    image: "help-images/sleeve-editor-2.png",
    callouts: [
      { n: 1, label: "Notes → tags", text: "The words you type in Notes become tag candidates — your vocabulary, not the app's" },
      { n: 2, label: "Merge",        text: "Select two tags and tap Merge to combine into a phrase — e.g. 'natural' + 'language' → 'natural language'" },
      { n: 3, label: "Tag chips",    text: "Yellow = selected and active; white = available; tap × to ignore" },
    ],
    summary: "Tags come from your own words. Type a description in Notes — the app reads it and suggests tags. You decide what sticks. Merge turns two single words into a phrase so multi-word ideas stay together as one searchable unit."
  },
  {
    id: 8,
    screen: "Utilities",
    title: "Utilities — Overview",
    tags: ["utilities", "fuel", "tank", "subscribe", "import", "share", "bundle", "contacts", "ignored words", "jerry can"],
    image: "help-images/utilities-top.png",
    callouts: [
      { n: 1, label: "Fuel gauge",       text: "Shows how many 5-hour blocks you have waiting to pour into your tank" },
      { n: 2, label: "Tank level",       text: "Yellow shows transcription hours available & digital readout in hours" },
      { n: 3, label: "Subscribe",        text: "A subscription will add 5 hours of transcription time / mo — opens the App Store" },
      { n: 4, label: "Buy ONDA Fuel",    text: "Purchase 5 hours of transcription time in the App Store — opens the App Store" },
      { n: 5, label: "Pour ONDA Fuel",   text: "Transfer your purchased hours (top left) into the tank" },
      { n: 6, label: "Save a Post",      text: "Bookmark a social media post or URL as a session entry in your catalog" },
      { n: 7, label: "Import Recording", text: "Import an audio file or .onda bundle from your device — supports .onda, .m4a, .mp3, .wav, .mp4, .aac, .ogg, .flac" },
      { n: 8, label: "Share Bundle",     text: "Package the current session as a .onda file and share it — audio, transcript, and metadata travel together to local or online storage" },
      { n: 9, label: "Ignored Words",    text: "Restore words you accidentally ignored — tap a word to select it, then tap Restore" },
    ],
    summary: "Utilities is your control panel for transcription fuel, importing external recordings, sharing sessions, and managing contacts and ignored words. Your free hour renews every month; subscribe for 5 hours/month; or buy a Jerry Can for a one-time 5-hour block."
  },
  {
    id: 9,
    screen: "Utilities",
    title: "Ignored Words",
    tags: ["utilities", "ignored words", "tags", "filter", "restore"],
    image: "help-images/utilities-top.png",
    callouts: [
      { n: 9, label: "Ignored Words", text: "Words you've told the app to skip when building tags — tap to open the list and restore any word you ignored by mistake" },
    ],
    summary: "When you tap × on a tag chip, that word gets added to your Ignored Words list. It won't appear as a tag suggestion again — unless you come here and restore it. Tap the word to select it, then tap Restore to bring it back."
  },
  {
    id: 11,
    screen: "Transcript",
    title: "Transcript — Overview",
    tags: ["transcript", "playback", "audio", "scrub", "karaoke", "share", "edit", "sleeve", "notes", "tags", "label", "cover", "index", "find", "copy", "translate"],
    image: "help-images/transcription-screen.png",
    callouts: [
      { n: 1, label: "Share",            text: "Share audio, transcript text, or a complete .onda bundle — everything travels in one file" },
      { n: 2, label: "Edit (pencil)",    text: "Edit the label, notes, cover image, tags, and album for this recording" },
      { n: 3, label: "Progress bars",    text: "Audio and transcript stay in sync — drag either bar to scrub, both move together" },
      { n: 4, label: "Play / Pause",     text: "Tap to play; tap again to pause. The current spoken word highlights in yellow as audio plays" },
      { n: 5, label: "Stop",             text: "Stop playback and return to the beginning of the current position" },
      { n: 6, label: "Rewind / Forward", text: "↺ rewinds 10 seconds · |< rewinds 2 minutes · ↻ forwards 10 seconds · >| jumps 2 minutes ahead" },
      { n: 7, label: "Index",            text: "Your personal navigation index for this session — tap any entry to jump to that moment in the audio" },
      { n: 8, label: "Find",             text: "Search for a word or phrase within this session" },
      { n: 9, label: "Copy",             text: "Copy the full transcript to your clipboard" },
      { n: 10, label: "Translate",       text: "Translate the transcript — output appears in the Edit screen" },
      { n: 11, label: "Edit",            text: "Opens the canvas screen for editing and AI prompts" },
    ],
    summary: "The Transcript screen has two jobs. The top section — label, notes, tags, cover — is about how this recording is found in your catalog. The bottom section — transcript, playback, toolbar — is about finding content inside the recording. Both matter, and they work together."
  },
  {
    id: 12,
    screen: "Transcript",
    title: "Finding this recording (sleeve)",
    tags: ["sleeve", "label", "notes", "tags", "cover", "catalog", "search", "keywords", "album", "seo"],
    image: "help-images/transcription-screen.png",
    callouts: [
      { n: 2, label: "Edit (pencil)", text: "Opens the sleeve editor — the place where you make this recording findable" },
    ],
    summary: "The label, notes, tags, and cover image you add here are your catalog-level keywords. When you search the Explore screen later, these are what surface this session. Think of the sleeve as the outside of the envelope — it's what the catalog sees. A good label and a few words in Notes is all it takes. The words you type become tag suggestions automatically."
  },
  {
    id: 13,
    screen: "Transcript",
    title: "Finding content inside this recording",
    tags: ["index", "find", "double-tap", "phrase", "navigate", "keyword", "notes", "catalog", "search"],
    image: "help-images/transcription-screen.png",
    callouts: [
      { n: 7, label: "Index",  text: "Double-tap any sentence to save it here instantly. Press and hold to select an exact phrase — then tap Phrase." },
      { n: 8, label: "Find",   text: "Search for any word or phrase — jumps to every match in the transcript" },
    ],
    summary: "Index entries are your personal navigation inside a session — tap any entry to jump to that moment in the audio. Double-tap a sentence for the fastest path. Press and hold to choose your exact words.\n\nHere's the insight that changes how you use the catalog: when you find something worth keeping, add that word or phrase to the session Notes. It crosses from inside the recording to the catalog level — and now it's searchable across every session in Explore. Once you know this, you'll wonder how you ever searched without it."
  },
  {
    id: 14,
    screen: "Transcript",
    title: "Sharing a recording",
    tags: ["share", "bundle", "onda", "audio", "transcript", "large files", "google drive", "icloud"],
    image: "help-images/share-bundle.png",
    callouts: [
      { n: 1, label: "Audio",              text: "Include the audio file in the share" },
      { n: 2, label: "Transcript text",    text: "Include the plain text transcript" },
      { n: 3, label: "Cover image",        text: "Include the cover photo" },
      { n: 4, label: "Send as .onda bundle", text: "One file with everything — opens in Onda Replay on any device" },
      { n: 5, label: "Share bundle",       text: "Send via Messages, email, AirDrop, Google Drive, or any app on your device" },
    ],
    summary: "The .onda bundle is the recommended way to share — audio, transcript, cover, tags, label, and notes all travel together in one file. The recipient opens it in Replay and gets the full experience.\n\nFor large files (over 25MB), email and Messages may not work. Use Google Drive or iCloud Drive instead: tap Share in Replay, save to Files, then share the link from Drive."
  },
];

// ── State ──────────────────────────────────────────────────────────────────
let activeTag = null;
let activeScreen = null;

// ── Boot ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const ctx = params.get('ctx');
  if (ctx) {
    activeScreen = ctx;
    document.getElementById('ctx-banner').style.display = 'block';
    document.getElementById('ctx-label').textContent = ctx;
  }
  buildSidebar();
  render();
});

function buildSidebar() {
  const screens = [...new Set(ARTICLES.map(a => a.screen))];
  const screenBase = activeScreen ? ARTICLES.filter(a => a.screen === activeScreen) : ARTICLES;

  const tagCounts = {};
  screenBase.forEach(a => a.tags.forEach(t => { tagCounts[t] = (tagCounts[t] || 0) + 1; }));
  const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);

  let html = `<div class="sidebar-section">Screens</div>`;
  html += `<button class="tag-btn ${!activeScreen ? 'active' : ''}" onclick="setScreen(null)">All <span class="count">${ARTICLES.length}</span></button>`;
  screens.forEach(s => {
    const cnt = ARTICLES.filter(a => a.screen === s).length;
    html += `<button class="tag-btn ${activeScreen === s ? 'active' : ''}" onclick="setScreen('${s}')">${s} <span class="count">${cnt}</span></button>`;
  });

  html += `<div class="sidebar-section">Topics</div>`;
  sortedTags.forEach(([tag, count]) => {
    html += `<button class="tag-btn ${activeTag === tag ? 'active' : ''}" onclick="setTag('${tag}')">${tag} <span class="count">${count}</span></button>`;
  });

  document.getElementById('sidebar').innerHTML = html;
}

function setScreen(screen) {
  activeScreen = screen;
  activeTag = null;
  if (!screen) clearCtx();
  buildSidebar();
  render();
}

function setTag(tag) {
  activeTag = tag;
  buildSidebar();
  render();
}

function clearCtx() {
  activeScreen = null;
  activeTag = null;
  document.getElementById('ctx-banner').style.display = 'none';
  window.history.replaceState({}, '', window.location.pathname);
  buildSidebar();
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = ARTICLES;
  if (activeScreen) filtered = filtered.filter(a => a.screen === activeScreen);
  if (activeTag) filtered = filtered.filter(a => a.tags.includes(activeTag));
  if (q) filtered = filtered.filter(a =>
    a.title.toLowerCase().includes(q) ||
    a.summary.toLowerCase().includes(q) ||
    a.callouts.some(c => c.label.toLowerCase().includes(q) || c.text.toLowerCase().includes(q))
  );

  const el = document.getElementById('cards');
  const none = document.getElementById('no-results');
  if (!filtered.length) { el.innerHTML = ''; none.style.display = 'block'; return; }
  none.style.display = 'none';

  el.innerHTML = filtered.map(a => `
    <div class="help-card" id="article-${a.id}" onclick="openSheet(${a.id})">
      <div class="card-header">
        <div class="card-header-text">
          <div class="card-screen">${a.screen}</div>
          <div class="card-title">${a.title}</div>
        </div>
        <span class="card-chevron">▶</span>
      </div>
    </div>
  `).join('');
}

function openSheet(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;

  document.getElementById('sheet-screen').textContent = a.screen;
  document.getElementById('sheet-title').textContent = a.title;
  document.getElementById('sheet-summary').textContent = a.summary;

  const thumb = document.getElementById('sheet-thumb');
  if (a.image) {
    thumb.src = a.image;
    thumb.style.display = 'block';
    thumb.onclick = (e) => openLightbox(e, a.image);
  } else {
    thumb.style.display = 'none';
  }

  const tbody = document.getElementById('sheet-callouts');
  tbody.innerHTML = '<tr><th>#</th><th>Control</th><th>Description</th></tr>' +
    a.callouts.map(c => `
      <tr>
        <td><span class="callout-num">${c.n}</span></td>
        <td class="callout-label">${c.label}</td>
        <td>${c.text}</td>
      </tr>
    `).join('');

  document.getElementById('sheet-tags').innerHTML =
    a.tags.map(t => `<span class="card-tag" onclick="setTag('${t}');closeSheet();">${t}</span>`).join('');

  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('sheet-body').scrollTop = 0;
}

function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('bottom-sheet').classList.remove('open');
}

function openLightbox(e, src) {
  e.stopPropagation();
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
</script>
</body>
</html>
